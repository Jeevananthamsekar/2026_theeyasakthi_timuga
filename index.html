<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>தமிழ் செய்தி</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ffecd2, #fcb69f);
    text-align: center;
    padding: 50px;
}
.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
h1 {
    color: #d32f2f;
}
p {
    font-size: 20px;
    line-height: 1.6;
}
</style>
</head>
<body>
<div class="container">
<h1>அறிக்கை</h1>
<p>
தீயசக்தி திமுக தோற்பது உறுதி<br>
பவர் ஸ்டார் ஸ்டாலின் படுதோல்வி அடைவது உறுதி<br>
தெருவில் போனவர்களை கள்ளக்கூட்டணியில் இணைத்து வெத்துவெட்டு கூட்டணி என நிரூபித்த 10 பைசா கூட்டணி தோற்பது உறுதி
</p>
</div>
</body>
</html>
